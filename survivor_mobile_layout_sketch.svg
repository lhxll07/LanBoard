  <g transform="translate(92 898)">
    <text x="0" y="0" fill="#EED8A7" font-size="16" font-family="Microsoft YaHei, sans-serif">这张板子只做一件事：定义“真正要画进游戏的对象长什么样”。如果这版方向对，下一步我就直接把这些轮廓语言落到 `SurvivorRenderItem` 里。</text>
  </g>

  <g transform="translate(1154 188)">
    <rect width="312" height="294" rx="26" fill="#161312" stroke="#332A26"/>
    <text x="24" y="38" fill="#F1E7D3" font-size="24" font-family="STSong, SimSun, serif" font-weight="700">HUD 规则</text>
    <text x="24" y="78" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">1. 深棕底，不用透明黑磨砂</text>
    <text x="24" y="110" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">2. 金属边框统一为旧铜金</text>
    <text x="24" y="142" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">3. 数值字号稳，标题可加书卷感</text>
    <text x="24" y="174" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">4. 武器图标比文字更重要</text>
    <text x="24" y="206" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">5. 升级卡像法帖 / 法箓，不像现代卡片</text>
    <g transform="translate(24 228)">
      <rect x="0" y="0" width="116" height="40" rx="10" fill="#241A17" stroke="#BE9557" stroke-width="2"/>
      <text x="58" y="25" text-anchor="middle" fill="#F4E9D4" font-size="18" font-family="STSong, SimSun, serif" font-weight="700">法箓升级</text>
    </g>
  </g>

  <g transform="translate(1154 506)">
    <rect width="312" height="256" rx="26" fill="#161312" stroke="#332A26"/>
    <text x="24" y="38" fill="#F1E7D3" font-size="24" font-family="STSong, SimSun, serif" font-weight="700">下一步该怎么改</text>
    <text x="24" y="78" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">1. 先改渲染对象，不先改文案</text>
    <text x="24" y="110" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">2. 先落玩家、三杂兵、三武器、宝石、法匣</text>
    <text x="24" y="142" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">3. 再统一 HUD 和升级弹窗</text>
    <text x="24" y="174" fill="#B8C1BC" font-size="16" font-family="Microsoft YaHei, sans-serif">4. 最后才改进化名、被动名、状态文案</text>
    <text x="24" y="214" fill="#D4B17A" font-size="15" font-family="Microsoft YaHei, sans-serif">重点：先让战斗一眼能看懂，再谈氛围。</text>
  </g>
</svg>
