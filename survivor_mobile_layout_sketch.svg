  <rect width="1560" height="980" fill="url(#bg)"/>

  <text x="72" y="86" fill="#F2E6CF" font-size="38" font-family="STSong, SimSun, serif" font-weight="700">Survivor 中国风资产定调板</text>
  <text x="72" y="122" fill="#A9B6B0" font-size="18" font-family="Microsoft YaHei, sans-serif">目标：不再讨论整页氛围，直接定义能不能一眼认出的玩家、怪物、武器、掉落物和 HUD 形状语言</text>

  <g filter="url(#shadow)">
