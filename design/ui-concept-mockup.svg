<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F3EC"/>
      <stop offset="1" stop-color="#EAEFEA"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F8F7F3"/>
      <stop offset="1" stop-color="#F1F2ED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0D1F1A" flood-opacity="0.10"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0D1F1A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 600 34px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1A2A25; letter-spacing: 0.5px; }
      .subtitle { font: 400 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #66736C; letter-spacing: 0.2px; }
      .phone-title { font: 600 18px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #23352F; }
      .brand { font: 600 30px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #17332B; letter-spacing: 0.8px; }
      .small { font: 400 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #7D877F; }
      .label { font: 500 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #53625B; }
      .input { font: 500 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1F2E29; }
      .button { font: 600 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #F7F7F4; }
      .button-secondary { font: 600 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #214136; }
      .section { font: 600 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #243730; }
      .status { font: 500 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2F5D4D; }
      .player { font: 600 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E2B27; }
      .meta { font: 400 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #7A847D; }
      .game-hero { font: 600 22px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #20332D; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="110" r="220" fill="#DCE8DF" fill-opacity="0.65"/>
  <circle cx="120" cy="780" r="240" fill="#ECE4D6" fill-opacity="0.55"/>

  <text x="90" y="92" class="title">LanBoard Mobile UI Concept</text>
  <text x="90" y="124" class="subtitle">Android-first / modern / quiet / elegant / card-based</text>

  <g filter="url(#shadow)">
    <rect x="96" y="185" rx="42" ry="42" width="392" height="640" fill="#111917"/>
    <rect x="114" y="204" rx="32" ry="32" width="356" height="602" fill="url(#hero)"/>
    <rect x="236" y="219" rx="14" ry="14" width="112" height="14" fill="#D9DDD7"/>

    <text x="147" y="287" class="brand">LanBoard</text>
    <text x="147" y="318" class="small">Local board game platform</text>

    <rect x="147" y="356" rx="26" ry="26" width="290" height="188" fill="#FCFCFA" stroke="#E7E4DB"/>
    <text x="173" y="393" class="label">Nickname</text>
    <rect x="173" y="410" rx="16" ry="16" width="238" height="46" fill="#F3F4EF"/>
    <text x="191" y="439" class="input">lhx</text>

    <text x="173" y="486" class="label">Server IP</text>
    <rect x="173" y="503" rx="16" ry="16" width="238" height="46" fill="#F3F4EF"/>
    <text x="191" y="532" class="input">192.168.1.20</text>

    <rect x="147" y="575" rx="22" ry="22" width="290" height="58" fill="#173A31"/>
    <text x="256" y="611" class="button">Create Room</text>

    <rect x="147" y="649" rx="22" ry="22" width="290" height="58" fill="#F8F8F5" stroke="#DADCD5"/>
    <text x="267" y="685" class="button-secondary">Join Room</text>

    <text x="215" y="754" class="small">Quiet UI for local matches</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="604" y="185" rx="42" ry="42" width="392" height="640" fill="#111917"/>
    <rect x="622" y="204" rx="32" ry="32" width="356" height="602" fill="#F5F5F1"/>
    <rect x="744" y="219" rx="14" ry="14" width="112" height="14" fill="#D9DDD7"/>

    <text x="656" y="276" class="phone-title">Room 2048</text>
    <text x="656" y="302" class="small">Host: lhx</text>
    <text x="887" y="276" class="small">4 seats</text>

    <text x="656" y="350" class="section">Players</text>

    <g filter="url(#soft)">
      <rect x="656" y="374" rx="24" ry="24" width="288" height="88" fill="#FEFEFC"/>
      <text x="682" y="410" class="player">lhx</text>
      <text x="682" y="433" class="meta">Host</text>
      <rect x="859" y="396" rx="14" ry="14" width="61" height="28" fill="#E6F0EA"/>
      <text x="874" y="414" class="status">Ready</text>
    </g>

    <g filter="url(#soft)">
      <rect x="656" y="478" rx="24" ry="24" width="288" height="88" fill="#FEFEFC"/>
      <text x="682" y="514" class="player">player02</text>
      <text x="682" y="537" class="meta">Member</text>
      <rect x="842" y="500" rx="14" ry="14" width="78" height="28" fill="#F2F0EB"/>
      <text x="856" y="518" class="meta">Waiting</text>
    </g>

    <g filter="url(#soft)">
      <rect x="656" y="582" rx="24" ry="24" width="288" height="88" fill="#FEFEFC"/>
      <text x="682" y="618" class="player">player03</text>
      <text x="682" y="641" class="meta">Member</text>
      <rect x="859" y="604" rx="14" ry="14" width="61" height="28" fill="#E6F0EA"/>
      <text x="874" y="622" class="status">Ready</text>
    </g>

    <text x="656" y="713" class="small">Room status: 3 / 4 ready to start</text>

    <rect x="656" y="734" rx="20" ry="20" width="132" height="52" fill="#F8F8F4" stroke="#D9DCD4"/>
    <text x="705" y="766" class="button-secondary">Ready</text>

    <rect x="812" y="734" rx="20" ry="20" width="132" height="52" fill="#173A31"/>
    <text x="843" y="766" class="button">Start Game</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1112" y="185" rx="42" ry="42" width="392" height="640" fill="#111917"/>
    <rect x="1130" y="204" rx="32" ry="32" width="356" height="602" fill="#F5F4EF"/>
    <rect x="1252" y="219" rx="14" ry="14" width="112" height="14" fill="#D9DDD7"/>

    <text x="1164" y="274" class="phone-title">Gomoku</text>
    <text x="1164" y="301" class="small">lhx vs player02</text>
    <text x="1371" y="274" class="small">Connected</text>

    <text x="1259" y="349" class="game-hero" text-anchor="middle">Your Turn</text>

    <rect x="1180" y="388" rx="28" ry="28" width="256" height="256" fill="#E6D2A7"/>
    <rect x="1202" y="410" width="212" height="212" fill="none" stroke="#8E744A" stroke-width="1.4"/>
    <g stroke="#8E744A" stroke-width="1.2" opacity="0.9">
      <line x1="1217" y1="410" x2="1217" y2="622"/>
      <line x1="1232" y1="410" x2="1232" y2="622"/>
      <line x1="1247" y1="410" x2="1247" y2="622"/>
      <line x1="1262" y1="410" x2="1262" y2="622"/>
      <line x1="1277" y1="410" x2="1277" y2="622"/>
      <line x1="1292" y1="410" x2="1292" y2="622"/>
      <line x1="1307" y1="410" x2="1307" y2="622"/>
      <line x1="1322" y1="410" x2="1322" y2="622"/>
      <line x1="1337" y1="410" x2="1337" y2="622"/>
      <line x1="1352" y1="410" x2="1352" y2="622"/>
      <line x1="1367" y1="410" x2="1367" y2="622"/>
      <line x1="1382" y1="410" x2="1382" y2="622"/>
      <line x1="1397" y1="410" x2="1397" y2="622"/>
      <line x1="1202" y1="425" x2="1414" y2="425"/>
      <line x1="1202" y1="440" x2="1414" y2="440"/>
      <line x1="1202" y1="455" x2="1414" y2="455"/>
      <line x1="1202" y1="470" x2="1414" y2="470"/>
      <line x1="1202" y1="485" x2="1414" y2="485"/>
      <line x1="1202" y1="500" x2="1414" y2="500"/>
      <line x1="1202" y1="515" x2="1414" y2="515"/>
      <line x1="1202" y1="530" x2="1414" y2="530"/>
      <line x1="1202" y1="545" x2="1414" y2="545"/>
      <line x1="1202" y1="560" x2="1414" y2="560"/>
      <line x1="1202" y1="575" x2="1414" y2="575"/>
      <line x1="1202" y1="590" x2="1414" y2="590"/>
      <line x1="1202" y1="605" x2="1414" y2="605"/>
    </g>
    <circle cx="1277" cy="500" r="8.5" fill="#20342E"/>
    <circle cx="1292" cy="515" r="8.5" fill="#F7F2E8" stroke="#B49A6A"/>
    <circle cx="1307" cy="530" r="8.5" fill="#20342E"/>
    <circle cx="1322" cy="545" r="8.5" fill="#F7F2E8" stroke="#B49A6A"/>

    <text x="1164" y="691" class="small">Black · You</text>
    <text x="1164" y="714" class="small">Stable local connection</text>

    <rect x="1164" y="734" rx="20" ry="20" width="132" height="52" fill="#F8F8F4" stroke="#D9DCD4"/>
    <text x="1214" y="766" class="button-secondary">Exit</text>

    <rect x="1320" y="734" rx="20" ry="20" width="132" height="52" fill="#173A31"/>
    <text x="1367" y="766" class="button">Resign</text>
  </g>
</svg>
