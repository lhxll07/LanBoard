<svg width="1880" height="1080" viewBox="0 0 1880 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="120" y1="60" x2="1740" y2="1020" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="0.5" stop-color="#EFF2EC"/>
      <stop offset="1" stop-color="#E8ECE7"/>
    </linearGradient>
    <linearGradient id="screen3" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FBFAF6"/>
      <stop offset="1" stop-color="#F1F3ED"/>
    </linearGradient>
    <linearGradient id="paperCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8F7F3"/>
    </linearGradient>
    <linearGradient id="inkMain" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#173A31"/>
      <stop offset="1" stop-color="#23473C"/>
    </linearGradient>
    <linearGradient id="gomokuTheme3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F4E5C7"/>
      <stop offset="1" stop-color="#E1C287"/>
    </linearGradient>
    <linearGradient id="unoTheme3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#202E2A"/>
      <stop offset="1" stop-color="#355449"/>
    </linearGradient>
    <linearGradient id="softBlock3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EEF1EB"/>
      <stop offset="1" stop-color="#E2E8E0"/>
    </linearGradient>
    <filter id="deviceShadow3" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#111B16" flood-opacity="0.11"/>
    </filter>
    <filter id="cardShadow3" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#17221D" flood-opacity="0.06"/>
    </filter>
    <style>
      .h1 { font: 600 40px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1F302A; letter-spacing: 0.4px; }
      .h2 { font: 400 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #6F7C74; }
      .eyebrow { font: 500 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #849188; letter-spacing: 1.8px; }
      .brand { font: 600 32px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #17392F; letter-spacing: 0.8px; }
      .pageTitle { font: 600 20px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #20342D; }
      .body { font: 400 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #748178; }
      .bodyDark { font: 500 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #253630; }
      .small { font: 400 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #8A958D; }
      .section { font: 600 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #23352F; }
      .gameTitle { font: 600 26px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1E2E28; }
      .gameTitleLight { font: 600 26px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #F6F3EC; }
      .btnMain { font: 600 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #F8F8F5; }
      .btnSub { font: 600 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #234237; }
      .chip { font: 500 12px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2F5C4D; }
      .player { font: 600 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1F2D29; }
      .meta { font: 400 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #7B857F; }
      .tab { font: 500 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #909990; }
      .tabOn { font: 600 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #17392F; }
      .settingTitle { font: 500 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #22342E; }
      .settingValue { font: 400 13px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #829188; }
    </style>
  </defs>

  <rect width="1880" height="1080" fill="url(#bg3)"/>
  <circle cx="1678" cy="140" r="232" fill="#DBE6DE" fill-opacity="0.78"/>
  <circle cx="188" cy="942" r="294" fill="#ECE2D1" fill-opacity="0.60"/>
  <circle cx="980" cy="118" r="94" fill="#F3F0E8" fill-opacity="0.92"/>

  <text x="94" y="92" class="h1">LanBoard Platform Concept v3</text>
  <text x="94" y="124" class="h2">Text-only navigation, quieter hierarchy, more premium spacing</text>

  <g filter="url(#deviceShadow3)">
    <rect x="88" y="190" width="450" height="796" rx="50" fill="#101816"/>
    <rect x="110" y="212" width="406" height="752" rx="36" fill="url(#screen3)"/>
    <rect x="254" y="228" width="118" height="14" rx="7" fill="#D8DDD7"/>

    <text x="152" y="298" class="eyebrow">TABLE CLUB</text>
    <text x="152" y="340" class="brand">LanBoard</text>
    <text x="152" y="370" class="body">A calm shell for board games, not a loud game lobby</text>

    <g filter="url(#cardShadow3)">
      <rect x="152" y="430" width="322" height="190" rx="34" fill="url(#gomokuTheme3)"/>
      <text x="184" y="468" class="small" fill="#836B43">FEATURED TABLE</text>
      <text x="184" y="512" class="gameTitle">Gomoku</text>
      <text x="184" y="538" class="bodyDark" fill="#66593E">Warm board tone inside the same restrained shell</text>
      <rect x="184" y="556" width="106" height="32" rx="16" fill="#F8F0DE" fill-opacity="0.72"/>
      <text x="210" y="577" class="small" fill="#6A5B3C">2 players</text>
      <g opacity="0.92">
        <rect x="354" y="460" width="90" height="90" rx="22" fill="#EAD4A7"/>
        <g stroke="#8A7248" stroke-width="1">
          <line x1="368" y1="474" x2="368" y2="536"/>
          <line x1="383" y1="474" x2="383" y2="536"/>
          <line x1="398" y1="474" x2="398" y2="536"/>
          <line x1="413" y1="474" x2="413" y2="536"/>
          <line x1="428" y1="474" x2="428" y2="536"/>
          <line x1="354" y1="489" x2="444" y2="489"/>
          <line x1="354" y1="504" x2="444" y2="504"/>
          <line x1="354" y1="519" x2="444" y2="519"/>
          <line x1="354" y1="534" x2="444" y2="534"/>
        </g>
        <circle cx="398" cy="504" r="7" fill="#17382F"/>
        <circle cx="413" cy="519" r="7" fill="#F7F2E8" stroke="#B2905D"/>
      </g>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="152" y="644" width="322" height="162" rx="34" fill="url(#unoTheme3)"/>
      <text x="184" y="682" class="small" fill="#CDD7D1">SECOND TABLE</text>
      <text x="184" y="726" class="gameTitleLight">UNO</text>
      <text x="184" y="752" class="body" fill="#D8E0DB">A brighter inner identity, still framed by the same outer calm</text>
      <g transform="translate(360 672) rotate(-11)">
        <rect x="0" y="0" width="34" height="54" rx="10" fill="#E74B45"/>
        <rect x="22" y="8" width="34" height="54" rx="10" fill="#F1D34B"/>
        <rect x="46" y="0" width="34" height="54" rx="10" fill="#4B86E8"/>
      </g>
      <rect x="184" y="762" width="122" height="24" rx="12" fill="#314C42"/>
      <text x="201" y="778" class="small" fill="#DCE4DF">party / fast / social</text>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="152" y="830" width="322" height="82" rx="28" fill="url(#paperCard)"/>
      <text x="182" y="862" class="bodyDark">Resume current room</text>
      <text x="182" y="886" class="small">Room 2048 · host active · 3 players online</text>
      <rect x="368" y="846" width="80" height="50" rx="25" fill="url(#inkMain)"/>
      <text x="393" y="878" class="btnMain">Enter</text>
    </g>

    <line x1="176" y1="936" x2="450" y2="936" stroke="#E4E6E0"/>
    <text x="182" y="966" class="tabOn">首页</text>
    <text x="302" y="966" class="tab">联机</text>
    <text x="420" y="966" class="tab">设置</text>
    <rect x="181" y="974" width="28" height="3" rx="1.5" fill="#17392F"/>
  </g>

  <g filter="url(#deviceShadow3)">
    <rect x="716" y="190" width="450" height="796" rx="50" fill="#101816"/>
    <rect x="738" y="212" width="406" height="752" rx="36" fill="url(#screen3)"/>
    <rect x="882" y="228" width="118" height="14" rx="7" fill="#D8DDD7"/>

    <text x="780" y="292" class="pageTitle">联机</text>
    <text x="780" y="320" class="body">Room 2048 · local session overview</text>
    <text x="1032" y="292" class="small">3 / 4</text>

    <g filter="url(#cardShadow3)">
      <rect x="780" y="370" width="322" height="84" rx="28" fill="url(#paperCard)"/>
      <text x="808" y="402" class="bodyDark">Current table</text>
      <text x="808" y="426" class="small">Gomoku selected · switch here later for UNO and more</text>
      <text x="1030" y="412" class="btnSub" text-anchor="end">更换</text>
    </g>

    <text x="780" y="502" class="section">玩家</text>

    <g filter="url(#cardShadow3)">
      <rect x="780" y="522" width="322" height="88" rx="28" fill="url(#paperCard)"/>
      <circle cx="816" cy="566" r="16" fill="#DDE7DF"/>
      <text x="846" y="559" class="player">lhx</text>
      <text x="846" y="583" class="meta">房主</text>
      <rect x="1010" y="547" width="68" height="28" rx="14" fill="#E2EEE8"/>
      <text x="1028" y="565" class="chip">已准备</text>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="780" y="626" width="322" height="88" rx="28" fill="url(#paperCard)"/>
      <circle cx="816" cy="670" r="16" fill="#ECEEE8"/>
      <text x="846" y="663" class="player">player02</text>
      <text x="846" y="687" class="meta">成员</text>
      <text x="1078" y="675" class="small" text-anchor="end">未准备</text>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="780" y="730" width="322" height="88" rx="28" fill="url(#paperCard)"/>
      <circle cx="816" cy="774" r="16" fill="#DDE7DF"/>
      <text x="846" y="767" class="player">player03</text>
      <text x="846" y="791" class="meta">成员</text>
      <rect x="1010" y="755" width="68" height="28" rx="14" fill="#E2EEE8"/>
      <text x="1028" y="773" class="chip">已准备</text>
    </g>

    <rect x="780" y="846" width="150" height="54" rx="27" fill="#FAFAF7" stroke="#DADDD6"/>
    <text x="855" y="880" class="btnSub" text-anchor="middle">准备</text>
    <rect x="952" y="846" width="150" height="54" rx="27" fill="url(#inkMain)"/>
    <text x="1027" y="880" class="btnMain" text-anchor="middle">开始游戏</text>

    <line x1="804" y1="936" x2="1078" y2="936" stroke="#E4E6E0"/>
    <text x="810" y="966" class="tab">首页</text>
    <text x="930" y="966" class="tabOn">联机</text>
    <text x="1048" y="966" class="tab">设置</text>
    <rect x="929" y="974" width="28" height="3" rx="1.5" fill="#17392F"/>
  </g>

  <g filter="url(#deviceShadow3)">
    <rect x="1344" y="190" width="450" height="796" rx="50" fill="#101816"/>
    <rect x="1366" y="212" width="406" height="752" rx="36" fill="url(#screen3)"/>
    <rect x="1510" y="228" width="118" height="14" rx="7" fill="#D8DDD7"/>

    <text x="1408" y="292" class="pageTitle">设置</text>
    <text x="1408" y="320" class="body">The shell stays neutral so different games can coexist elegantly</text>

    <g filter="url(#cardShadow3)">
      <rect x="1408" y="372" width="322" height="88" rx="28" fill="url(#softBlock3)"/>
      <text x="1438" y="405" class="settingTitle">昵称</text>
      <text x="1438" y="430" class="settingValue">lhx</text>
      <text x="1700" y="418" class="btnSub" text-anchor="end">编辑</text>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="1408" y="478" width="322" height="88" rx="28" fill="url(#paperCard)"/>
      <text x="1438" y="511" class="settingTitle">默认端口</text>
      <text x="1438" y="536" class="settingValue">44567</text>
      <text x="1700" y="524" class="btnSub" text-anchor="end">修改</text>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="1408" y="584" width="322" height="88" rx="28" fill="url(#paperCard)"/>
      <text x="1438" y="617" class="settingTitle">服务器验证</text>
      <text x="1438" y="642" class="settingValue">先预留，后续用于演示环境接入</text>
      <text x="1700" y="630" class="small" text-anchor="end">关闭</text>
    </g>

    <g filter="url(#cardShadow3)">
      <rect x="1408" y="702" width="322" height="150" rx="32" fill="url(#paperCard)"/>
      <text x="1438" y="738" class="section">视觉原则</text>
      <text x="1438" y="766" class="body">平台层统一使用纸面、石感、墨色。</text>
      <text x="1438" y="790" class="body">不同桌游只在自身页面里放大个性。</text>
      <text x="1438" y="814" class="body">底部导航坚持纯文字，不引入图标噪音。</text>
      <circle cx="1622" cy="766" r="15" fill="#17392F"/>
      <circle cx="1662" cy="766" r="15" fill="#E5D2A1"/>
      <circle cx="1702" cy="766" r="15" fill="#E74B45"/>
    </g>

    <line x1="1432" y1="936" x2="1706" y2="936" stroke="#E4E6E0"/>
    <text x="1438" y="966" class="tab">首页</text>
    <text x="1558" y="966" class="tab">联机</text>
    <text x="1676" y="966" class="tabOn" text-anchor="end">设置</text>
    <rect x="1648" y="974" width="28" height="3" rx="1.5" fill="#17392F"/>
  </g>

  <text x="142" y="1022" class="h2">Note: game sessions should still open as full-screen pages without the bottom navigation, keeping the play surface focused and premium.</text>
</svg>
